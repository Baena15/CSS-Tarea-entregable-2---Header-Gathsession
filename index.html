<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GathSession - Build Your Best Community</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">
  <link href='https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap' rel="stylesheet">
</head>

<body>

  <!-- ==================== HEADER ==================== -->
  <header class="header">
    <div class="container">
      
      <!-- Logo -->
      <a href="#" class="logo">
        <span class="logo-gath">Gath</span><span class="logo-session">Session<span class="logo-dot">.</span></span>
      </a>
      
      <!-- Navegación -->
      <nav class="nav">
        <a href="#" class="nav-link active">Home</a>
        <a href="#" class="nav-link">Features</a>
        <a href="#" class="nav-link">Blog</a>
        <a href="#" class="nav-link">Contact</a>
        <a href="#" class="nav-link">About Us</a>
      </nav>
      
    </div>
  </header>

  <!-- ==================== HERO SECTION ==================== -->
  <section class="hero">
    <div class="container">
      
      <div class="hero-content">
        
        <!-- Columna Izquierda: Texto -->
        <div class="hero-left">
          <h1 class="hero-title">
            Build your best<br>
            community<br>
            starting from here.
          </h1>
          
          <p class="hero-description">
            Meet and communicate with the best people to run<br>
            projects, events or other activities in a more effective<br>
            and fun way
          </p>
          
          <div class="hero-buttons">
            <a href="#" class="btn-primary">Get Started</a>
            <a href="#" class="btn-link">
              <span class="btn-link-text">Learn More</span> <img src="img/flecha.svg" alt="Arrow" class="arrow-img">
            </a>
          </div>
          
          <!-- Features -->
          <div class="hero-features">
            <div class="feature-item">
              <div class="feature-icon">
                <img src="img/build.svg" alt="Build" width="64" height="64">
              </div>
              <div class="feature-text">
                <span class="feature-title">Build</span>
                <span class="feature-subtitle">Community</span>
              </div>
            </div>
            
            <div class="feature-item">
              <div class="feature-icon">
                <img src="img/calendario.svg" alt="Calendar" width="64" height="64">
              </div>
              <div class="feature-text">
                <span class="feature-title">Share</span>
                <span class="feature-subtitle">Events</span>
              </div>
            </div>
            
            <div class="feature-item">
              <div class="feature-icon">
                <img src="img/montaña.svg" alt="Information" width="64" height="64">
              </div>
              <div class="feature-text">
                <span class="feature-title">Get</span>
                <span class="feature-subtitle">Information</span>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Columna Derecha: Grid de Imágenes -->
        <div class="hero-right">
          <div class="people-grid">
            <!-- Persona 1 - Morado (arriba izquierda) -->
            <div class="person-card person-1">
              <div class="person-bg purple"></div>
              <img src="img/black-men.png" alt="Community member" class="person-img">
            </div>
            
            <!-- Persona 2 - Turquesa (arriba derecha) -->
            <div class="person-card person-2">
              <div class="person-bg cyan"></div>
              <img src="img/china.png" alt="Community member" class="person-img">
            </div>
            
            <!-- Persona 3 - Amarillo (derecha) -->
            <div class="person-card person-3">
              <div class="person-bg yellow"></div>
              <img src="img/black-women.png" alt="Community member" class="person-img">
            </div>
            
            <!-- Persona 4 - Naranja (centro derecha) -->
            <div class="person-card person-4">
              <div class="person-bg orange"></div>
              <img src="img/glass-men.png" alt="Community member" class="person-img">
            </div>
            
            <!-- Persona 5 - Rosa (abajo izquierda) -->
            <div class="person-card person-5">
              <div class="person-bg pink"></div>
              <img src="img/pelirroja.png" alt="Community member" class="person-img">
            </div>
          </div>
          
          <!-- Líneas decorativas de fondo -->
          <div class="decorative-lines">
            <svg viewBox="0 0 900 900" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="450" cy="450" r="400" stroke="#3D4150" stroke-width="1"/>
              <circle cx="450" cy="450" r="280" stroke="#3D4150" stroke-width="1"/>
            </svg>
          </div>
        </div>
        
      </div>
      
    </div>
  </section>

</body>
</html>
